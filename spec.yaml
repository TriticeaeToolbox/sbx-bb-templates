schemaVersion: "1"
kind: sandbox
name: claude-bb-templates
displayName: Generate BB Templates
description: Adds the generate-breedbase-templates skill and some additional python dependencies

sandbox:
  image: "djw64/sbx-bb-templates"
  aiFilename: CLAUDE.md
  entrypoint:
    run: ["claude", "--dangerously-skip-permissions"]

network:
  serviceDomains:
    api.anthropic.com: anthropic
    console.anthropic.com: anthropic
  serviceAuth:
    anthropic:
      headerName: x-api-key
      valueFormat: "%s"
  allowedDomains:
    - "claude.com:443"

credentials:
  sources:
    anthropic:
      env:
        - ANTHROPIC_API_KEY

agentContext: |
  The project directory should contain breeder-provided data that needs to be converted into
  standardized breedbase upload templates.  First, ask the user to briefly describe the data:
  such as the crop, breeding program, and anything that is unique about this dataset that may
  be difficult to process.  Then, use the /generate-breedbase-templates skill to start the workflow.